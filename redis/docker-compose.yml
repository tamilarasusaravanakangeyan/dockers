services:
  redis:
    image: redis:latest
    container_name: my-secure-redis
    restart: always
    ports:
      - "6379:6379"
    environment:
      - REDIS_USERNAME=${REDIS_USERNAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    command: >
      sh -c "
        set -eu;
        test -n \"$REDIS_USERNAME\";
        test -n \"$REDIS_PASSWORD\";
        echo 'user default off' > /data/users.acl;
        echo \"user $REDIS_USERNAME on >$REDIS_PASSWORD ~* +@all\" >> /data/users.acl;
        exec redis-server --appendonly yes --aclfile /data/users.acl
      "

volumes:
  redis-data:
