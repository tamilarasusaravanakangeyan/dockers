receivers:
  otlp:
    protocols:
      grpc:
      http:

exporters:
  otlp/elastic:
    endpoint: "http://apm-server:8200"
    tls:
      insecure: true

processors:
  batch:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/elastic]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/elastic]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/elastic]
